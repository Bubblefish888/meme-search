const HOT_TAGS = ['摸鱼','干饭','打工','摆烂','社畜','周一','猫猫','生气','开心','无语','笑死'];

function initTags(){
  document.getElementById('hotTags').innerHTML = HOT_TAGS.map(t =>
    `<button onclick="searchTag('${t}')">${t}</button>`
  ).join('');
  searchTag(HOT_TAGS[0]);
}
initTags();

function searchTag(tag){
  document.querySelectorAll('.tags button').forEach(b=>b.classList.remove('active'));
  if(event?.target) event.target.classList.add('active');
  document.getElementById('searchInput').value = tag;
  doSearch(tag);
}

function search(){
  const q = document.getElementById('searchInput').value.trim();
  if(q) doSearch(q);
}

function doSearch(q){
  const query = q.toLowerCase();
  // Score each meme by keyword match
  const scored = MEMES.map(m => {
    let score = 0;
    const kws = m.k.toLowerCase().split(' ');
    const text = m.t.toLowerCase();
    kws.forEach(k => { if(query.includes(k) || k.includes(query)) score += 10; });
    if(text.includes(query)) score += 8;
    const queryChars = [...query];
    queryChars.forEach(c => { if(m.k.includes(c)) score += 3; });
    return {meme:m, score};
  });

  const results = scored.filter(s => s.score > 0).sort((a,b) => b.score - a.score);

  if(results.length === 0){
    // Show random memes with a "not found" message
    const random = MEMES.sort(()=>Math.random()-0.5).slice(0,20);
    document.getElementById('memeGrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#94a3b8">没找到「'+q+'」的表情包，看看这些吧</div>' +
      random.map(m => memeCard(m)).join('');
  } else {
    document.getElementById('memeGrid').innerHTML = results.slice(0,40).map(s => memeCard(s.meme)).join('');
  }
}

function memeCard(m){
  return `<div class="meme-card" onclick="copyMeme(this,'${m.e} ${m.t}')">
    <div class="emoji">${m.e}</div>
    <div class="text">${m.t}</div>
    <div class="keywords">${m.k.split(' ').slice(0,3).join('·')}</div>
    <div class="overlay">📋 点击复制</div>
  </div>`;
}

function copyMeme(el, text){
  navigator.clipboard.writeText(text).then(()=>{
    el.style.borderColor = '#22c55e';
    setTimeout(()=>el.style.borderColor='#334155',600);
    document.getElementById('toast').classList.add('show');
    setTimeout(()=>document.getElementById('toast').classList.remove('show'),1500);
  });
}
